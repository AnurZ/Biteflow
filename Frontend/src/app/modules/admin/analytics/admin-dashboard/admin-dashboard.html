<div class="dashboard">

  <div class="controls">
    <div class="field">
      <label>From</label>
      <input type="date" [(ngModel)]="fromDate" [disabled]="isTodayMode" />
    </div>

    <div class="field">
      <label>To</label>
      <input type="date" [(ngModel)]="toDate" [disabled]="isTodayMode" />
    </div>

    <button (click)="applyFilter()" [disabled]="isTodayMode">Apply</button>

    <button (click)="toggleTodayMode()">
      {{ isTodayMode ? 'Disable Today' : 'Today' }}
    </button>
  </div>



  <app-kpi [range]="range" [refreshTick]="refreshTick"></app-kpi>

  <app-live-orders></app-live-orders>

  <div class="charts-grid">



    <app-revenue-chart [range]="range" [refreshTick]="refreshTick"></app-revenue-chart>

    <app-orders-chart [range]="range" [refreshTick]="refreshTick"></app-orders-chart>

    <app-top-selling-chart [range]="range" [refreshTick]="refreshTick"></app-top-selling-chart>

  </div>

</div>
