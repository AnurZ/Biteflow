<div
  cdkDropList
  class="kpi-section"
  [cdkDropListData]="kpiCards"
  cdkDropListOrientation="horizontal"
  [class.edit-mode]="isEditMode"
  (cdkDropListDropped)="dropKpi($event)"
>

  <div
    class="kpi-card"
    *ngFor="let card of kpiCards"
    cdkDrag
    [cdkDragDisabled]="!isEditMode"
  >

    <ng-container [ngSwitch]="card">

      <!-- ORDERS -->
      <ng-container *ngSwitchCase="'orders'">
        <div class="kpi-title">Orders</div>
        <div class="kpi-value">{{kpi?.totalOrders}}</div>
      </ng-container>

      <!-- REVENUE -->
      <ng-container *ngSwitchCase="'revenue'">
        <div class="kpi-title">Revenue</div>
        <div class="kpi-value">${{kpi?.revenue}}</div>
      </ng-container>

      <!-- AVG ORDER -->
      <ng-container *ngSwitchCase="'avgOrder'">
        <div class="kpi-title">Avg Order</div>
        <div class="kpi-value">${{kpi?.avgOrderValue}}</div>
      </ng-container>

      <!-- TOP ITEM -->
      <ng-container *ngSwitchCase="'topItem'">
        <div class="kpi-title">Top Item</div>
        <div class="kpi-value">{{kpi?.topItem}}</div>
      </ng-container>

    </ng-container>

  </div>

</div>
