<div class="card">
  <div class="card-header">
    <div class="title">Orders Management</div>

    <div class="actions">
      <mat-form-field appearance="outline" class="search">
        <mat-label>Search Orders</mat-label>
       <!-- <input matInput (keyup.enter)="onSearch($any($event.target).value)"
               placeholder="Order #, table, customer..." /> -->
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter">
        <mat-label>Status</mat-label>
        <mat-select (selectionChange)="onStatusFilter($event.value)">
          <mat-option value="">All</mat-option>
          <mat-option value="New">New</mat-option>
          <mat-option value="Preparing">Preparing</mat-option>
          <mat-option value="Ready">Ready</mat-option>
          <mat-option value="Completed">Completed</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>

  <div class="table-wrap">
    <table mat-table  class="mat-elevation-z1">

      <!-- Order ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="sortable">Order #</th>
        <td mat-cell *matCellDef="let r">#{{ r.id }}</td>
      </ng-container>

      <!-- Table -->
      <ng-container matColumnDef="tableNumber">
        <th mat-header-cell *matHeaderCellDef class="sortable">Table</th>
        <td mat-cell *matCellDef="let r">{{ r.tableNumber }}</td>
      </ng-container>

      <!-- Items -->
      <ng-container matColumnDef="items">
        <th mat-header-cell *matHeaderCellDef>Items</th>
        <td mat-cell *matCellDef="let r">
          <div class="items-preview">
            {{ r.itemsSummary }}
          </div>
        </td>
      </ng-container>

      <!-- Total -->
      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef class="sortable">Total</th>
        <td mat-cell *matCellDef="let r">
          <span class="price">{{ r.totalPrice | currency:'EUR' }}</span>
        </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r">
          <span class="status" [ngClass]="r.status.toLowerCase()">
            {{ r.status }}
          </span>
        </td>
      </ng-container>

      <!-- Time -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef class="sortable">Time</th>
        <td mat-cell *matCellDef="let r">
          {{ r.createdAt | date:'HH:mm' }}
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="right">Actions</th>
        <td mat-cell *matCellDef="let r" class="right my-actions">

          <button mat-icon-button (click)="view(r.id)" matTooltip="View">
            <mat-icon>visibility</mat-icon>
          </button>

          <button mat-icon-button (click)="changeStatus(r.id)" matTooltip="Update Status">
            <mat-icon>autorenew</mat-icon>
          </button>

        </td>
      </ng-container>

     <!-- <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>

    -->
    </table>
  </div>

  <!--<mat-paginator [length]="total"
                 [pageSize]="pageSize"
                 [pageIndex]="pageNumber - 1"
                 [pageSizeOptions]="[5,10,25,50]"
                 (page)="onPage($event)">
  </mat-paginator>
  -->
</div>
